site_name: Rostyslav Fedechko | Digital Marketing
site_description: Portfolio of Performance Marketing Specialist
site_author: Rostyslav Fedechko

theme:
  name: material
  palette:
    # Світла тема
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Перемкнути на темну тему
    # Темна тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Перемкнути на світлу тему
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate

nav:
  - Про мене: index.md
  - Досвід роботи: experience.md
  - Навички та Освіта: skills.md
  - Тестові завдання:
      - Case 1 (eCommerce): case1.md
      - Case 2 (Веб-аналітика): case2.md
      - Case 3 (Python & Data): case3.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  alternate:
    - name: Українська
      link: /
      lang: uk
    - name: English
      link: /en/
      lang: en

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: uk
          default: true
          name: Українська
        - locale: en
          name: English
          nav_translations:
            Про мене: About Me
            Досвід роботи: Experience
            Навички та Освіта: Skills & Education
            Тестові завдання: Case Studies
            Кейс 1 (eCommerce): Case 1 (eCommerce)
            Кейс 2 (Веб-аналітика): Case 2 (Web Analytics)
            Кейс 3 (Python & Data): Case 3 (Python & Data)